<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <h1>
            <i class="fa-solid fa-wallet"></i>
            Expense Tracker
        </h1>
        <div class="search-box">
            <input type="search" id="searchInput" placeholder="Search Expense...">
            <button id="searchBtn" type="button">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
    </header>
    <section class="dashboard">
        <div class="card">
            <h3>Total Expenses</h3>
            <p id="totalExpenses">0</p>
        </div>
        <div class="card">
            <h3>Total Amount</h3>
            <p id="totalAmount">Rs. 0</p>
        </div>
    </section>

    <section class="add-expense">
        <h2>Add Expense</h2>
        <form id="expenseForm">
            <div class="form-group">
                <label for="title">Expense Title</label>
                <input type="text" id="title" placeholder="Enter Expense Title" required>
            </div>
            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" placeholder="Enter Amount" min="1" required>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" required>
                    <option value="">Select Category</option>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <button id="addBtn" type="submit">
                <i class="fa-solid fa-plus"></i>
                Add Expense
            </button>
        </form>

    </section>

    <section class="filter-section">
        <h2>Filter Expenses</h2>
        <select id="filterCategory">
            <option value="All">All Categories</option>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
        </select>
    </section>

    <section class="expense-list">
        <h2>Expense List</h2>
        <div id="expenseContainer">
            <p id="noData">
                No Data Found
            </p>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
